# Sirve el SPA y hace proxy de la API al backend, en el mismo origen.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Comprime respuestas de texto.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Rutas del cliente (React Router): todo lo que no sea archivo → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Estáticos con hash: cache larga.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API: /api/* → app:8000/*  (la barra final quita el prefijo /api)
    location /api/ {
        proxy_pass http://app:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;      # el LLM puede tardar en responder
        client_max_body_size 25m;     # audios / adjuntos
    }
}
